<!DOCTYPE html>
<html lang="fr">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           RÉGLAGES GLOBAUX & TYPOGRAPHIE
           ========================================================================== */
        body {
            font-family: 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ==========================================================================
           NAVIGATION (Simplifiée)
           ========================================================================== */
        nav {
            background-color: #0f172a; 
            width: 100%;
            height: 80px; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        nav .logo {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 4px;
        }

        /* ==========================================================================
           SECTION : PAIEMENT STRIPE
           ========================================================================== */
        .checkout-section {
            flex: 1; 
            padding: 60px 20px;
            max-width: 1050px;
            margin: 0 auto;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .checkout-section h1 {
            font-size: 2.5rem;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .checkout-section p {
            font-size: 1.15rem;
            color: #475569;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .stripe-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 6px solid #0f172a;
            min-height: 400px; 
        }

        /* ==========================================================================
           PIED DE PAGE (FOOTER)
           ========================================================================== */
        .site-footer {
            background-color: #0b1120; 
            color: #cbd5e1;
            padding: 30px 20px; 
            text-align: center;
            border-top: 1px solid #1e293b; 
        }

        .footer-logo {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 4px;
            display: block;
            margin-bottom: 10px;
        }

        .site-footer p { font-size: 0.85rem; color: #475569; margin: 0; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">AXIOME</a>
